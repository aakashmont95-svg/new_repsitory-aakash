<!DOCTYPE html>
<html>

<head>
    <title>User Login Form</title>

    <!-- Basic Meta -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:title" content="UP Police Login Form">
    <meta property="og:description" content="Secure login form for UP Police users with official email validation.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourwebsite.com/">
    <meta property="og:image" content="https://yourwebsite.com/preview.jpg">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="UP Police Login Form">
    <meta name="twitter:description" content="Secure login form for UP Police users with official email validation.">
    <meta name="twitter:image" content="https://yourwebsite.com/preview.jpg">

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">
        <h2>User Login</h2>

        <form id="loginForm">
            <label>Name:</label>
            <input type="text" id="name" required>

            <label>Email:</label>
            <input type="email" id="email" required>

            <label>Password:</label>
            <input type="password" id="password" required>

            <button type="submit">Submit</button>
        </form>

        <p id="message"></p>
    </div>

    <script src="script.js"></script>
</body>

</html>
